services:
  frontend:    # Svelte/TypeScript app on port 3000
    build:
      context: ../../frontend        # Path to Dockerfile
    ports:
      - "3000:3000"                  # host:container
    depends_on:
      - backend                      # Start after backend

  backend:     # Go API on port 8080
    build:
      context: ../../backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql                # Service name = hostname
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=devpassword
      - DB_NAME=portfolio
    depends_on:
      mysql:
        condition: service_healthy

  mysql:       # MySQL 8.0
    image: mysql:8.0
    ports:
      - "3307:3306"                  # Host 3307 -> Container 3306 (avoids local MySQL conflict)
    environment:
      - MYSQL_ROOT_PASSWORD=devpassword
      - MYSQL_DATABASE=portfolio
    volumes:
      - mysql_data:/var/lib/mysql    # Persist data between restarts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdevpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data: