# =============================================================================
# NGINX CONFIGURATION - SvelteKit SPA
# =============================================================================
# This configuration is optimized for serving a Single Page Application (SPA)
# with proper routing, compression, caching, and security headers.
# =============================================================================

server {
    # -------------------------------------------------------------------------
    # Basic Server Configuration
    # -------------------------------------------------------------------------

    # Listen on port 3000 (matches docker-compose configuration)
    # Using port 3000 instead of default 80 for consistency with Node.js apps
    listen 3000;

    # Server name - underscore matches any hostname
    # In production, replace with your actual domain
    server_name _;

    # Root directory where static files are located
    # This matches where we copy files in the Dockerfile
    root /usr/share/nginx/html;

    # Default index file
    index index.html;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    # Compresses responses to reduce bandwidth and improve load times
    # Can reduce file sizes by 70-90% for text-based assets

    # Enable gzip compression
    gzip on;

    # Minimum file size to compress (smaller files may not benefit)
    gzip_min_length 1000;

    # Compression level (1-9, higher = more compression but more CPU)
    # Level 6 is a good balance between compression ratio and CPU usage
    gzip_comp_level 6;

    # MIME types to compress
    # Don't compress already-compressed formats like images, videos
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Add 'Vary: Accept-Encoding' header for proper caching
    gzip_vary on;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    # These headers protect against common web vulnerabilities

    # Prevent clickjacking attacks
    # SAMEORIGIN allows framing only from the same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    # Forces browser to use declared Content-Type
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter in older browsers
    # Modern browsers have this built-in, but helps with legacy support
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy - controls how much referrer info is sent
    # 'strict-origin-when-cross-origin' is a good balance of privacy and functionality
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # SPA Routing (Client-Side Routing Support)
    # -------------------------------------------------------------------------
    # SvelteKit uses client-side routing, meaning URLs like /about, /gallery
    # don't correspond to actual files on disk. We need to serve index.html
    # for all routes and let the JavaScript router handle navigation.

    location / {
        # Try to serve the requested file directly
        # If not found, try as a directory
        # If still not found, serve index.html (SPA fallback)
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Static Asset Caching
    # -------------------------------------------------------------------------
    # Vite/SvelteKit generates hashed filenames for assets (e.g., app.abc123.js)
    # These can be cached aggressively since the hash changes when content changes

    # JavaScript and CSS files (with hashed names from Vite)
    location ~* \.(js|css)$ {
        # Cache for 1 year - safe because Vite uses content hashing
        expires 1y;

        # Allow caching by browsers and CDNs
        add_header Cache-Control "public, immutable";

        # Re-add security headers (add_header in location blocks replaces parent)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Images, fonts, and other static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        # Cache for 1 month
        expires 30d;

        # Allow caching
        add_header Cache-Control "public";

        # Disable access logging for static assets (reduces log noise)
        access_log off;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # Error Pages
    # -------------------------------------------------------------------------

    # Custom 404 - serve index.html for SPA to handle
    error_page 404 /index.html;

    # Server error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------

    # Access log location (Docker captures stdout by default)
    access_log /var/log/nginx/access.log;

    # Error log location
    error_log /var/log/nginx/error.log warn;
}
