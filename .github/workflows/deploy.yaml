name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: harkportfolioacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: harkportfolioacr.azurecr.io/frontend:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: harkportfolioacr.azurecr.io/backend:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/aks-set-context@v3
        with:
          resource-group: Portfolio
          cluster-name: hark-portfolio-aks

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend frontend=harkportfolioacr.azurecr.io/frontend:${{ github.sha }} -n portfolio

      - name: Update backend image
        run: |
          kubectl set image deployment/backend backend=harkportfolioacr.azurecr.io/backend:${{ github.sha }} -n portfolio
